<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Profile &amp; Settings</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="app.js"></script>
    <style>
        .profile-card {
            max-width: 500px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .profile-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
        .profile-header h2 { margin: 0; color: #1e40af; }
        .info-section { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14.5px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: #64748b; font-weight: 500; }
        .info-value { color: #0f172a; font-weight: 600; }
        .btn-update { background: #1e40af; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; font-size: 15px; margin-top: 10px; }
        .btn-update:hover { background: #1d4ed8; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #64748b; font-size: 14px; font-weight: 500; }
        .back-link:hover { color: #1e40af; }
        .section-divider { border: 0; height: 1px; background: #e2e8f0; margin: 20px 0; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <h2>User Profile Info</h2>
        <p style="color: #64748b; margin: 5px 0 0 0; font-size: 14px;">Manage your personal credentials &amp; account info</p>
    </div>

    <div class="info-section">
        <div class="info-row">
            <span class="info-label">User ID / Username:</span>
            <span class="info-value" id="currentUsernameDisplay">Loading...</span>
        </div>
        <div class="info-row">
            <span class="info-label">Current Email:</span>
            <span class="info-value" id="currentEmailDisplay">Loading...</span>
        </div>
        <div class="info-row">
            <span class="info-label">System Role:</span>
            <span class="info-value" id="currentRoleDisplay" style="text-transform: uppercase; color: #2563eb;">Loading...</span>
        </div>
    </div>

    <form id="profileForm">
        <h3 style="font-size: 16px; color: #0f172a; margin-bottom: 15px;">Update Account Information</h3>

        <div class="form-group">
            <label>User ID / Username (For Login)</label>
            <input type="text" id="userId" placeholder="e.g. NewJohnDoe" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="e.g. newemail@mail.com" required>
        </div>

        <hr class="section-divider">

        <h3 style="font-size: 16px; color: #0f172a; margin-bottom: 15px;">Change Security Password (Optional)</h3>

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="oldPassword" placeholder="Enter your current password (required to change password)">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter your new password">
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your new password">
        </div>

        <button type="submit" class="btn-update">Save Changes 💾</button>
    </form>

    <a id="backLink" href="dashboard.html" class="back-link">&larr; Back to Dashboard</a>
</div>

<script>
    const session = requireLogin();

    window.onload = function () {
        document.getElementById('userId').value = session.userId;
        document.getElementById('email').value = session.email || '';
        document.getElementById('currentUsernameDisplay').innerText = session.userId;
        document.getElementById('currentEmailDisplay').innerText = session.email || 'not set';
        document.getElementById('currentRoleDisplay').innerText = session.role;
        document.getElementById('backLink').href = session.role === 'admin' ? 'room-management.html' : 'dashboard.html';
        document.getElementById('backLink').innerText = session.role === 'admin' ? '← Back to Admin Dashboard' : '← Back to Student Dashboard';
    };

    document.getElementById('profileForm').addEventListener('submit', function (event) {
        event.preventDefault();

        const newUserId = document.getElementById("userId").value;
        const email = document.getElementById("email").value;
        const oldPassword = document.getElementById("oldPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (newPassword || confirmPassword) {
            if (newPassword !== confirmPassword) {
                alert("Error: New password and confirmation password do not match!");
                return;
            }
            if (!oldPassword) {
                alert("Error: Please provide your current password to update security credentials.");
                return;
            }
        }

        fetch('/auth/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                currentUserId: session.userId,
                role: session.role,
                newUserId: newUserId,
                email: email,
                oldPassword: oldPassword,
                newPassword: newPassword
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert(data.message);

                // keep the local session in sync with what we just saved
                setSession(data.userId, session.role, data.email);
                session.userId = data.userId;
                session.email = data.email;

                document.getElementById("currentUsernameDisplay").innerText = data.userId;
                document.getElementById("currentEmailDisplay").innerText = data.email || 'not set';
                document.getElementById("oldPassword").value = "";
                document.getElementById("newPassword").value = "";
                document.getElementById("confirmPassword").value = "";
            } else {
                alert("Failed: " + data.message);
            }
        })
        .catch(err => {
            console.error("Error communicating with profile service:", err);
            alert("System error: Failed to connect to the profile management service.");
        });
    });
</script>

</body>
</html>
