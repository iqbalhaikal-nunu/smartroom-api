<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Account Password</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        .reset-box {
            max-width: 420px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-reset {
            width: 100%; background: #1e40af; color: white; padding: 12px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 15px; margin-top: 15px;
        }
        .btn-reset:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="reset-box">
    <h2 style="text-align: center; color: #1e40af; margin-top: 0;">Reset Password</h2>
    <p style="text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px;">Please provide your account information below to update your security password.</p>

    <form id="resetForm">
        <div class="form-group">
            <label>User ID / Username</label>
            <input type="text" id="userid" placeholder="Enter your Username or ID" required>
        </div>

        <div class="form-group">
            <label>Account Type / Role</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter your new password" required>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your new password" required>
        </div>

        <button type="submit" class="btn-reset">Save &amp; Update Password</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a href="login.html" style="color: #64748b; font-size: 14px; text-decoration: none;">&larr; Back to Login</a>
    </div>
</div>

<script>
    document.getElementById('resetForm').addEventListener('submit', function (event) {
        event.preventDefault();

        const userid = document.getElementById("userid").value;
        const role = document.getElementById("role").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (newPassword !== confirmPassword) {
            alert("Error: New password and confirmation password do not match!");
            return;
        }

        fetch('/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userid, role, newPassword })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert("Success! " + data.message);
                window.location.href = "login.html";
            } else {
                alert("Failed: " + data.message);
            }
        })
        .catch(err => {
            console.error("Error running password recovery service:", err);
            alert("System error: could not reach the password recovery service.");
        });
    });
</script>

</body>
</html>
